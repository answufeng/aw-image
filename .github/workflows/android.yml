# 构建、Lint、单测与 demo R8；AGP 8.x 需要 Java 17+
name: Android CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute for gradlew
        run: chmod +x gradlew

      - name: Assemble library & run unit tests & lint
        run: ./gradlew :aw-image:assembleRelease :aw-image:testDebugUnitTest :aw-image:lintRelease --no-daemon

      - name: Demo release (verify R8 + consumer rules)
        run: ./gradlew :demo:assembleRelease --no-daemon
