# Library assemble + lint + ktlint + demo R8；AGP 8.x 需要 JDK 17
name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Assemble library, lint & ktlint
        run: ./gradlew :aw-image:assembleRelease :aw-image:lintRelease :aw-image:ktlintCheck --no-daemon

      - name: Demo release (R8 + consumer rules)
        run: ./gradlew :demo:assembleRelease --no-daemon

      - name: Upload lint HTML reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: aw-image/build/reports/
